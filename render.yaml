services:
  - type: web
    name: pead-analysis
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WRDS_USERNAME
        value: fje9hz
    disk:
      name: pead-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
