version: "3.9"

services:
  pead-app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    environment:
      - WRDS_USERNAME=fje9hz
      - WRDS_PASSWORD=${WRDS_PASSWORD:-}
      - PEAD_REFRESH_TOKEN=${PEAD_REFRESH_TOKEN:-local-dev-refresh-token}
    restart: unless-stopped
